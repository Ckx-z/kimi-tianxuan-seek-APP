# v4 GNN 模型配置 — 缩小模型 + 纯 Focal Loss + batch 支持

featurizer:
  atom_dim: 37
  edge_dim: 5

encoder:
  in_dim: 37
  hidden_dim: 128
  num_layers: 3
  dropout: 0.15
  jk_pooling: mean

attention:
  hidden_dim: 128
  num_heads: 4
  dropout: 0.15

pooling:
  hidden_dim: 128
  pool_dim: 128
  num_queries: 4

heads:
  hidden_dim: 128
  film_head:
    hidden_dims: [256, 128]
    dropout: 0.25

loss:
  focal_alpha: 0.75
  focal_gamma: 2.0

training:
  batch_size: 64
  max_epochs: 200
  early_stop_patience: 15
  learning_rate: 0.0005
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
  warmup_epochs: 5
  grad_clip: 1.0

evaluation:
  cv_folds: 3
  cv_repeats: 3

model:
  use_3d: false
  monomer_3d_dim: 10
  dimer_3d_dim: 10
  dim_rules: 34

data:
  train_csv: data/processed/v5_train_stage1_aug_v2.csv
