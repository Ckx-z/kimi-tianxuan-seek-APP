# LLM 路由配置
# 所有 API key 必须从环境变量或 gitignored 的 config/secrets.local.json 读，
# 绝不能写进任何代码或提交入 git 的配置文件。
# 统一入口: bridge/llm_client.py（chat_completion 主端点失败自动回落 longcat）
# PowerShell 设置:
#   $env:KIMI_API_KEY = "你的kimi key"
#   $env:MINIMAX_API_KEY = "你的minimax key"
#   $env:LONGCAT_API_KEY = "你的longcat key"

# 主 LLM：用于方案 docx 拼装、结构化抽取（成本低、平台一致）
primary:
  provider: minimax
  base_url: https://api.minimax.chat/v1
  api_key_env: MINIMAX_API_KEY
  model: MiniMax-Text-01
  max_tokens: 8000
  temperature: 0.3

# 备用 LLM：OpenAI 兼容端点，主端点失败/未配置时自动回落
# 切换方式: llm_client.chat_completion() 默认按 fallback_order (minimax -> longcat)
# 依次尝试; 传 provider='longcat' 可强制走备用。key 放 secrets.local.json 或环境变量。
fallback:
  provider: longcat
  base_url: https://api.longcat.chat/openai/v1
  api_key_env: LONGCAT_API_KEY
  model: LongCat-2.0
  max_tokens: 8000
  temperature: 0.3

# 任务路由
routing:
  docx_assembly:
    primary: primary            # 拼装用主 LLM
    fallback: fallback
    on_failure: retry_with_fallback

  failure_diagnosis:
    primary: fallback           # 诊断用备用 LLM（化学推理强）
    fallback: primary
    on_failure: return_null

  literature_synthesis:
    primary: fallback
    fallback: primary
    on_failure: return_null

  schema_extraction:
    primary: primary            # 结构化抽取用主 LLM
    fallback: fallback

# Embedding 后端（用于本地 PDF 检索）
embedding:
  provider: minimax             # 起步用 MiniMax，必要时换 BGE
  base_url: https://api.minimax.chat/v1
  api_key_env: MINIMAX_API_KEY
  model: embeding-01             # 占位，请按实际端点修正
  dimension: 1536

# 检索配置
retrieval:
  top_k: 20                     # 检索 Top-K 邻居
  context_budget: 50            # 拼装到 prompt 的最大 case 数
  min_similarity: 0.7           # 低于此阈值的 case 不入 prompt

# 失败回显措辞模板（精细化）
failure_echo_template:
  fields:
    - 匹配类型           # 直接相似 / 同骨架外推 / 同中心核外推 / 不同中心核外推 / 文献对照
    - 案例来源           # 必填
    - 失败Class          # A / B / C / D / E / F / G
    - 根因Type           # 单体 / 条件 / 操作（辅助，可空）
    - 置信度             # 高 / 中 / 低
    - 处置建议           # 具体条件调整 + 文献支撑
    - 引用               # [本地: 路径, 位置] 或 [标题](URL)
