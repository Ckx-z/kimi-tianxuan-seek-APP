# LLM 路由配置
# 所有 API key 必须从环境变量读，绝不能写进任何代码或配置文件
# PowerShell 设置:
#   $env:KIMI_API_KEY = "你的kimi key"
#   $env:MINIMAX_API_KEY = "你的minimax key"

# 主 LLM：用于方案 docx 拼装、结构化抽取（成本低、平台一致）
primary:
  provider: minimax
  base_url: https://api.minimax.chat/v1    # 占位，请按实际端点修正
  api_key_env: MINIMAX_API_KEY
  model: MiniMax-Text-01
  max_tokens: 8000
  temperature: 0.3

# 备用 LLM：用于复杂化学推理、失败诊断、文献综述
fallback:
  provider: kimi
  base_url: https://api.kimi.com/coding/v1
  api_key_env: KIMI_API_KEY
  model: kimi for coding
  max_tokens: 16000
  temperature: 0.2

# 任务路由
routing:
  docx_assembly:
    primary: primary            # 拼装用主 LLM
    fallback: fallback
    on_failure: retry_with_fallback

  failure_diagnosis:
    primary: fallback           # 诊断用备用 LLM（化学推理强）
    fallback: primary
    on_failure: return_null

  literature_synthesis:
    primary: fallback
    fallback: primary
    on_failure: return_null

  schema_extraction:
    primary: primary            # 结构化抽取用主 LLM
    fallback: fallback

# Embedding 后端（用于本地 PDF 检索）
embedding:
  provider: minimax             # 起步用 MiniMax，必要时换 BGE
  base_url: https://api.minimax.chat/v1
  api_key_env: MINIMAX_API_KEY
  model: embeding-01             # 占位，请按实际端点修正
  dimension: 1536

# 检索配置
retrieval:
  top_k: 20                     # 检索 Top-K 邻居
  context_budget: 50            # 拼装到 prompt 的最大 case 数
  min_similarity: 0.7           # 低于此阈值的 case 不入 prompt

# 失败回显措辞模板（精细化）
failure_echo_template:
  fields:
    - 匹配类型           # 直接相似 / 同骨架外推 / 同中心核外推 / 不同中心核外推 / 文献对照
    - 案例来源           # 必填
    - 失败Class          # A / B / C / D / E / F / G
    - 根因Type           # 单体 / 条件 / 操作（辅助，可空）
    - 置信度             # 高 / 中 / 低
    - 处置建议           # 具体条件调整 + 文献支撑
    - 引用               # [本地: 路径, 位置] 或 [标题](URL)
